# Pre-commit hooks — enforce lint, format, and type-check locally.
# Install once per clone:
#     source .venv/bin/activate
#     pre-commit install
#
# After install, every `git commit` runs these against staged files and
# blocks the commit if anything fails. Also runs in CI, so bypassing
# locally (--no-verify) won't help — the same checks gate merges.

repos:
  # Ruff — lint (with auto-fix) and format.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ty — Astral's type checker. Local hook with pinned dep, so pre-commit
  # manages its own isolated venv — no reliance on the developer's shell
  # having .venv activated when git commit fires. Runs against the whole
  # project (types are inferred cross-file).
  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: ty check
        language: python
        additional_dependencies: ["ty>=0.0.61", "pytest>=8", "httpx>=0.27"]
        types: [python]
        pass_filenames: false
        require_serial: true
