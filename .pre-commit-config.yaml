# Lint, format, type-check. Same tools run in CI, so `git commit --no-verify`
# doesn't help — the checks gate merges.

repos:
  # Ruff — lint (with auto-fix) and format.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # ty — Astral's type checker. Local hook with additional_dependencies so
  # pre-commit manages an isolated venv. pass_filenames: false because ty
  # infers types cross-file.
  - repo: local
    hooks:
      - id: ty
        name: ty type checker
        entry: ty check
        language: python
        additional_dependencies: ["ty>=0.0.61", "pytest>=8", "httpx>=0.27"]
        types: [python]
        pass_filenames: false
        require_serial: true
