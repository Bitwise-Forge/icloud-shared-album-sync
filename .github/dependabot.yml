version: 2
updates:
  # Python deps — runtime (httpx) and dev group (pytest, ruff, ty, pre-commit).
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "dev-deps"
      include: scope

  # Docker base image (python:3.14-alpine) and the uv builder image, both
  # pinned in the Dockerfile FROM lines.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "docker"
      include: scope

  # Actions pinned in .github/workflows/*.yml (ci.yml, release.yml).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: scope
