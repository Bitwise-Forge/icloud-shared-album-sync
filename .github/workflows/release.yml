name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Least-privilege default. Individual jobs widen scope for what they need.
permissions:
  contents: read

jobs:
  quality-gate:
    name: Lint, format, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: ty type check
        run: uv run ty check

      - name: pytest with 100% coverage gate
        run: uv run pytest --cov=sync --cov-report=term-missing --cov-fail-under=100

  docker-publish:
    name: Build and push multi-arch image to GHCR
    needs: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write        # push to ghcr.io
      id-token: write        # OIDC for provenance signing
      attestations: write    # attach SLSA provenance attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (for arm64 emulation on the amd64 runner)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/bitwise-forge/icloud-shared-album-sync
          # Disable the implicit `latest=auto` behavior — otherwise metadata-
          # action adds :latest on any git-tag-triggered run, ignoring the
          # `enable=` we set on the explicit type=raw line below.
          flavor: |
            latest=false
          # Minimal tag matrix: exact git tag + latest (stable releases only).
          # type=ref uses the raw tag name (v0.1.0, not just 0.1.0) so image
          # tags mirror git tags exactly. Pre-release tags (v0.0.1-test,
          # v0.1.0-rc1) publish under their versioned tag only.
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

  create-release:
    name: Create GitHub Release
    needs: docker-publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write        # create the Release + tag notes
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Print lines between `## [<version>]` and the next `## [` header.
          notes=$(awk "/^## \\[${version}\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          # Write to a file for the release action to consume.
          printf '%s\n' "$notes" > release_notes.md
          echo "Extracted release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
